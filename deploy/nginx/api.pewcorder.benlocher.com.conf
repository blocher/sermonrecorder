upstream backend_pewcorder {
    server 127.0.0.1:8003;
}

# Certbot will add the HTTPS server block and rewrite this to redirect.
server {
    listen 80;
    listen [::]:80;
    server_name api.pewcorder.benlocher.com;

    add_header X-Debug-Site pewcorder-api always;

    client_max_body_size 500m;
    client_body_buffer_size 128k;

    location = / {
        return 302 https://pewcorder.benlocher.com/;
    }

    location /static/ {
        alias /var/www/api.pewcorder.benlocher.com/backend/staticfiles/;
        autoindex off;
        try_files $uri $uri/ =404;
        expires 7d;
        etag on;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://backend_pewcorder;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
