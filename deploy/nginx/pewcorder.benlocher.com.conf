# Certbot will add the HTTPS server block and rewrite this to redirect.
server {
    listen 80;
    listen [::]:80;
    server_name pewcorder.benlocher.com;

    add_header X-Debug-Site pewcorder-web always;

    root /var/www/pewcorder.benlocher.com/dist;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        etag on;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
